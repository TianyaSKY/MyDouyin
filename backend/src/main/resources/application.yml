server:
  port: ${BACKEND_PORT:18081}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:douyin}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${MYSQL_USER:douyin_user}
    password: ${MYSQL_PASSWORD:douyin_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:user}
    password: ${RABBITMQ_PASSWORD:password}

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.douyin.entity

# JWT Configuration
jwt:
  secret: d0uy1n-mvp-s3cret-key-pl3ase-change-in-production-at-least-256-bits-long!!
  expiration: 604800000   # 7 days in ms (single token mode)

app:
  upload:
    base-dir: storage
    temp-dir: tmp
    video-dir: videos
    url-prefix: /uploads/videos/

# Milvus Configuration
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}

# Recommend Service Configuration (FastAPI)
recommend:
  service:
    url: ${RECOMMEND_SERVICE_URL:http://localhost:18101}
    timeout: ${RECOMMEND_SERVICE_TIMEOUT:5000}
    retry: ${RECOMMEND_SERVICE_RETRY:3}
