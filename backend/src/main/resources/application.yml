server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/douyin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: douyin_user
    password: douyin_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.douyin.entity

# JWT Configuration
jwt:
  secret: d0uy1n-mvp-s3cret-key-pl3ase-change-in-production-at-least-256-bits-long!!
  expiration: 604800000   # 7 days in ms (single token mode)

app:
  upload:
    base-dir: storage
    temp-dir: tmp
    video-dir: videos
    url-prefix: /uploads/videos/
