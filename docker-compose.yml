version: '3.8'

services:
  # MySQL - Primary Database
  mysql:
    image: mysql:8.0
    container_name: douyin-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: douyin
      MYSQL_USER: douyin_user
      MYSQL_PASSWORD: douyin_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - douyin-net

  # Redis - Cache & Counters
  redis:
    image: redis:7.0-alpine
    container_name: douyin-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - douyin-net

  # MinIO - Object Storage (Video/Image)
  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    container_name: douyin-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - douyin-net

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: douyin-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - douyin-net

  # Milvus - Vector Database (Standalone Mode)
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - douyin-net

  minio-milvus: # Separate MinIO for Milvus internal usage
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - milvus_minio_data:/data
    command: minio server /data --console-address ":9001"
    networks:
      - douyin-net

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.1
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio-milvus:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio-milvus"
    networks:
      - douyin-net

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  milvus_data:
  milvus_etcd_data:
  milvus_minio_data:

networks:
  douyin-net:
    driver: bridge
